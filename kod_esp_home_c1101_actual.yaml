substitutions:
  device_name: "Radio CC11"

esphome:
  name: c11
  friendly_name: "Radio CC11"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:
  level: WARN

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  # Keep fast_connect disabled so ESP can scan and pick the best available AP.
  fast_connect: false
  networks:
    - ssid: !secret wifi_dol
      password: !secret wifi_pass_dol
    - ssid: !secret wifi_ssid
      password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "C11 Fallback Hotspot"
    password: !secret fallback_ap_password

captive_portal:

safe_mode:
  num_attempts: 3

# ------------------------------------------------------
# EXTERNAL COMPONENTS
# ------------------------------------------------------
external_components:
  - source: github://SzczepanLeon/esphome-components@main
    components: [ wmbus_radio, wmbus_meter, wmbus_common ]

# ------------------------------------------------------
# SPI BUS
# ------------------------------------------------------
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

# ------------------------------------------------------
# WMBUS RADIO – CC1101
# ------------------------------------------------------
wmbus_radio:
  radio_type: CC1101
  cs_pin: GPIO5
  irq_pin: GPIO4
  frequency: 868.95MHz

# ------------------------------------------------------
# WMBUS METER – GAMA350
# ------------------------------------------------------
wmbus_meter:
  - id: gama350
    meter_id: 0x31676464
    type: amiplus
    key: !secret key_gama350
    mode:
      - C1

# ------------------------------------------------------
# SENSORS – WMBUS
# ------------------------------------------------------
sensor:
  - platform: wmbus_meter
    parent_id: gama350
    field: total_energy_consumption_kwh
    name: "Całkowita energia L1"
    accuracy_decimals: 3
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing

  - platform: wmbus_meter
    parent_id: gama350
    field: rssi_dbm
    name: "Energia RSSI"
    accuracy_decimals: 0
    unit_of_measurement: "dBm"
    device_class: signal_strength
    state_class: measurement
    entity_category: diagnostic

