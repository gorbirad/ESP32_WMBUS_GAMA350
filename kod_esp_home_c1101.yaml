# ------------------------------------------------------
# DIAGNOSTICS
# ------------------------------------------------------
  - platform: wifi_signal
    name: "${device_name} WiFi Sygnał"
    update_interval: 60s
    id: wifi_signal_db
    entity_category: diagnostic

  - platform: uptime
    name: "${device_name} Czas Pracy"
    update_interval: 300s
    device_class: duration
    state_class: total_increasing
    unit_of_measurement: "s"
    entity_category: diagnostic

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent ${device_name}"
    unit_of_measurement: "%"
    entity_category: diagnostic
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);

# ------------------------------------------------------
# SWITCHES
# ------------------------------------------------------
switch:
  - platform: restart
    name: "${device_name} Reset"

# ------------------------------------------------------
# TEXT SENSORS
# ------------------------------------------------------
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${device_name} IP Adres"
    ssid:
      name: "${device_name} Połączony z siecią"
    mac_address:
      name: "${device_name} Mac Adres WiFi"

# ------------------------------------------------------
# BINARY SENSORS
# ------------------------------------------------------
binary_sensor:
  - platform: status
    name: "${device_name} Status"