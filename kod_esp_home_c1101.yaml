# TIME
# ------------------------------------------------------
time:
  - platform: sntp
    id: time_sntp

# ------------------------------------------------------
# EXTERNAL COMPONENTS
# ------------------------------------------------------
external_components:
  - source: github://SzczepanLeon/esphome-components@version_4
    refresh: 0d
    components: [ wmbus ]

# # ------------------------------------------------------
# # WMBUS + CC1101 CONFIG
# # ------------------------------------------------------
wmbus:
  mosi_pin: GPIO23
  miso_pin: GPIO19
  clk_pin:  GPIO18
  cs_pin:   GPIO5
  gdo0_pin: GPIO4
  gdo2_pin: GPIO27
  
  led_pin: GPIO0
  led_blink_time: "1s"
  
  frequency: 868.950
  all_drivers: False
  sync_mode: true
  log_all: true

# # ------------------------------------------------------
# # SENSORS – WMBUS
# # ------------------------------------------------------
sensor:
